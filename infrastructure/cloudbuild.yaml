steps:
  # 1. Kod analiz ve statik testler (Linting vb.)
  - name: 'python:3.10-slim'
    id: 'Static Tests & Linting'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install flake8
        flake8 ./agents ./autonomous ./dashboard --count --select=E9,F63,F7,F82 --show-source --statistics
        
  # 2. Digital Twin Simülasyonu Tetikleme
  # (Simülasyon servisinin Cloud Run URL'sine bir istek atarak veya Pub/Sub ile)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Run Digital Twin Simulation'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Simulating new perception and control models in Digital Twin..."
        # Gerçekte bir Pub/Sub mesajı veya HTTP isteği:
        gcloud pubsub topics publish agent-results-topic --message='{"action": "run_sim", "branch": "$BRANCH_NAME"}'
        
        # Testlerin bitmesini beklemek için polling mekanizması (sembolik)
        sleep 10
        echo "Digital Twin Testleri tamamlandı."

  # 3. Docker Imajlarını Oluşturma (Örnek olarak dashboard-service)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Dashboard Service'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/dashboard-service:$COMMIT_SHA', './dashboard']

  # 4. Container Registry'e Pushlama
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Dashboard Service'
    args: ['push', 'gcr.io/$PROJECT_ID/dashboard-service:$COMMIT_SHA']

  # 5. Staging Ortamına Deploy (Test başarılıysa otomatik)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Staging'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dashboard-service-staging'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dashboard-service:$COMMIT_SHA'
      - '--region'
      - 'europe-west3'
      - '--allow-unauthenticated'

  # 6. Production Deployment Agent Tetikleme (Sadece Onaylanmış Raporlar / PR'lar için)
  # (Bu adım manuel onay (approval gate) gerektirdiği için cloud build tarafında
  # Deployment Agent topic'ine 'Staging başarılı, onaya hazır' mesajı iletilir)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Trigger Deployment Agent Approval Gate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud pubsub topics publish deployment-topic --message='{"status": "staging_ready", "commit": "$COMMIT_SHA"}'

images:
  - 'gcr.io/$PROJECT_ID/dashboard-service:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
